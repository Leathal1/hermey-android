name: Hermdroid CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Test
        run: cd core && go test ./... -v -race -count=1
      - name: Vet
        run: cd core && go vet ./...

  android-build:
    name: Android Build
    runs-on: macos-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build AAR
        run: |
          mkdir -p app/libs
          cd core && gomobile bind -target=android/arm64 -o ../app/libs/hermey-core.aar .

      - name: Build APK
        run: cd app && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermey-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
